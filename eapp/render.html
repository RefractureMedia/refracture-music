<html>

<head>
    <style>
        body {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body style="margin: 0 0 0 0 !important;">
    <script>
        const remote = require('electron').remote;
        function win_minimize() {
            remote.BrowserWindow.getFocusedWindow().minimize();
        }
        function win_maximize() {
            remote.BrowserWindow.getFocusedWindow().isMaximized() ? remote.BrowserWindow.getFocusedWindow().unmaximize() : remote.BrowserWindow.getFocusedWindow().maximize();
        }
    </script>
    <iframe id="content" width="100%" height="100%" src="http://localhost:21122/home" frameborder="0"></iframe>
</body>

</html>
